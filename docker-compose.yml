services:
  fing-agent-familypotter:
    image: fing/fing-agent:latest
    container_name: fing-agent-familypotter
    # HOST networking is required so the agent can ARP-scan the LAN.
    # On QNAP (Linux), network_mode: host works natively — ports 44444
    # (Fing cloud sync) and 49090 (Local API) are exposed on the NAS IP.
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - /share/fing-data:/app/fingdata
    restart: always

# No named volume needed — data is stored directly on the QNAP share.
